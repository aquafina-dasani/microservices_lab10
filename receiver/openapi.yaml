openapi: 3.0.3
info:
  title: Race Timing Analysis API
  version: "1.0.0"
  description: API for a race timing and scoring analysis for endurance motorsport events.
  contact:
    email: ncao5@my.bcit.ca
paths:
  /race/laps:
    post:
      summary: Reports a batch of completed laps for a specific stint
      operationId: app.report_lap_batch
      description: Adds a batch of lap records
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LapBatch'
      responses:
        '201':
          description: Batch successfully received
        '400':
          description: Invalid input or object invalid
  /race/sectors:
    post:
      summary: Return a batch of sector split times
      operationId: app.report_sector_batch
      description: Adds a batch of sector timing splits from each lap in a stint
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SectorBatch'
      responses:
        '201':
          description: Batch successfully received
        '400':
          description: Invalid input or object invalid
components:
  schemas:
    LapBatch:
      additionalProperties: false
      type: object
      required:
        - car_id
        - batch_id
        - stint_id
        - batch_timestamp
        - laps
      properties:
        car_id:
          type: string
          example: "BMW_10"
        batch_id:
          type: string
          format: uuid
          example: "d290f1ee-6c54-4b01-90e6-d701748f0851"
        stint_id:
          type: string
          example: "STINT_01"
        batch_timestamp:
          type: string
          format: date-time
          example: "2026-01-21T09:12:33.001Z"
        laps:
          type: array
          items:
            $ref: '#/components/schemas/LapItem'

    LapItem:
      additionalProperties: false
      type: object
      required:
        - lap_number
        - lap_time_seconds
        - fuel_consumed_kg
        - max_speed_kph
      properties:
        lap_number:
          type: integer
          example: 10
        lap_time_seconds:
          type: number
          example: 100.95
        fuel_consumed_kg:
          type: number
          example: 20.50
        max_speed_kph:
          type: number
          example: 255.55
    
    SectorBatch:
      additionalProperties: false
      type: object
      required:
        - car_id
        - batch_id
        - stint_id
        - batch_timestamp
        - sectors
      properties:
        car_id:
          type: string
          example: "BMW_10"
        batch_id:
          type: string
          format: uuid
          example: "d290f1ee-6c54-4b01-90e6-d701748f0851"
        stint_id:
          type: string
          example: "STINT_01"
        batch_timestamp:
          type: string
          format: date-time
          example: "2026-01-21T09:12:33.001Z"
        sectors:
          type: array
          items:
            $ref: '#/components/schemas/SectorItem'
    
    SectorItem:
      additionalProperties: false
      type: object
      required:
        - lap_number
        - sector_id
        - sector_time_seconds
        - entry_speed_kph
        - exit_speed_kph
      properties:
        lap_number:
          type: integer
          example: 10
        sector_id:
          type: string
          example: "SECTOR_01"
        sector_time_seconds:
          type: number
          example: 20.26
        entry_speed_kph:
          type: number
          example: 210.50
        exit_speed_kph:
          type: number
          example: 155.10