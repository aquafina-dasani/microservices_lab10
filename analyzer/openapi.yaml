openapi: 3.0.3
info:
  title: Analyzer API
  version: "1.0.0"
  description: This API provides event info directly from the Kafka event store.
  contact:
    email: ncao5@my.bcit.ca
paths:
  /race/laps:
    get:
      summary: gets a lap reading from history
      operationId: app.get_lap_reading
      description: Gets lap readings from the event store at a specific index
      parameters:
        - name: index
          in: query
          description: Gets the lap reading at the specified index in the event store
          schema:
            type: integer
            example: 0
      responses:
        '200':
          description: Successfully returned a lap reading
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LapItem'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /race/sectors:
    get:
      summary: gets a sector reading from history
      operationId: app.get_sector_reading
      description: Gets sector readings from the event store at a specific index
      parameters:
        - name: index
          in: query
          description: Gets the sector reading at the specified index in the event store
          schema:
            type: integer
            example: 0
      responses:
        '200':
          description: Successfully returned a sector reading
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectorItem'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /stats:
    get:
      summary: gets the reading stats
      operationId: app.get_stats
      description: Gets the total counts of the history events in the queue
      responses:
        '200':
          description: Successfully returned the statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stats'

components:
  schemas:
    LapItem:
      type: object
      properties:
        car_id:
          type: string
        batch_id:
          type: string
          format: uuid
        stint_id:
          type: string
        batch_timestamp:
          type: string
          format: date-time
        lap_number:
          type: integer
        lap_time_seconds:
          type: number
        fuel_consumed_kg:
          type: number
        max_speed_kph:
          type: number
        trace_id:
          type: string
    SectorItem:
      type: object
      properties:
        car_id:
          type: string
        batch_id:
          type: string
          format: uuid
        stint_id:
          type: string
        batch_timestamp:
          type: string
          format: date-time
        lap_number:
          type: integer
        sector_id:
          type: string
        sector_time_seconds:
          type: number
        entry_speed_kph:
          type: number
        exit_speed_kph:
          type: number
        trace_id:
          type: string
    Stats:
      required:
        - num_laps
        - num_sectors
      properties:
        num_laps:
          type: integer
          example: 100
        num_sectors:
          type: integer
          example: 300
      type: object