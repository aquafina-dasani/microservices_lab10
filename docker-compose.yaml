version: "3.8"
services:
  zookeeper:
    image: wurstmeister/zookeeper
    volumes:
      - zookeeper-data:/data

  kafka:
    image: wurstmeister/kafka
    command: [start-kafka.sh]
    # ports:        <-- REMOVED: Now strictly internal
    #   - "9092:9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "events:1:1"
    depends_on:
      - "zookeeper"
    volumes:
      - kafka-data:/kafka
    restart: on-failure

  db:
    image: mysql:latest
    container_name: mysql_race_db
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: 1
      MYSQL_USER: ncao5
      MYSQL_PASSWORD: "1220"
      MYSQL_DATABASE: race_db
    # ports:        <-- REMOVED: Now strictly internal
    #   - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: on-failure

  # THE REVERSE PROXY (Your Receptionist)
  nginx:
    image: nginx:latest
    ports:
      - "80:80"     # THE ONLY OPEN DOOR TO YOUR APP
    volumes:
      # Plugs in your Nginx routing rules
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Plugs in your Vanilla JS dashboard HTML/CSS/JS files
      - ./dashboard-ui:/usr/share/nginx/html:ro
    depends_on:
      - receiver
      - storage
      - processing
      - analyzer

  receiver:
    build:
      context: receiver
      dockerfile: Dockerfile
    restart: on-failure
    # ports:        <-- REMOVED
    #   - "8080:8080"
    environment:
      - CORS_ALLOW_ALL=yes
    deploy:
      replicas: 3   # SCALING: Spins up 3 identical receiver containers
    depends_on:
      - kafka
    volumes:
      - ./config:/config
      - ./logs:/logs

  storage:
    build:
      context: storage
      dockerfile: Dockerfile
    restart: on-failure
    environment:
      - CORS_ALLOW_ALL=no
    depends_on:
      - receiver
      - db
      - kafka
    volumes:
      - ./config:/config
      - ./logs:/logs

  processing:
    build:
      context: processing
      dockerfile: Dockerfile
    restart: on-failure
    # ports:        <-- REMOVED
    #   - "8100:8100"
    environment:
      - CORS_ALLOW_ALL=no
    depends_on:
      - storage
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./data/processing:/data

  analyzer:
    build:
      context: analyzer
      dockerfile: Dockerfile
    restart: on-failure
    # ports:        <-- REMOVED
    #   - "8110:8110"
    environment:
      - CORS_ALLOW_ALL=no
    depends_on:
      - storage
      - kafka
      - receiver
    volumes:
      - ./config:/config
      - ./logs:/logs

volumes:
  mysql_data:
  kafka-data:
  zookeeper-data: