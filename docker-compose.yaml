version: "3.8"
services:
  zookeeper:
    image: wurstmeister/zookeeper
    volumes:
      - zookeeper-data:/data
  kafka:
    image: wurstmeister/kafka
    command: [start-kafka.sh]
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "events:1:1"
    depends_on:
      - "zookeeper"
    volumes:
      - kafka-data:/kafka
    restart: on-failure
  db:
    image: mysql:latest
    container_name: mysql_race_db
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: 1
      MYSQL_USER: ncao5
      MYSQL_PASSWORD: "1220"
      MYSQL_DATABASE: race_db
    volumes:
      - mysql_data:/var/lib/mysql
    restart: on-failure

  receiver:
    build:
      context: receiver
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    volumes:
      - ./config:/config
      - ./logs:/logs

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dashboard-ui:/usr/share/nginx/html:ro
    depends_on:
      - receiver
      - storage
      - processing
      - analyzer

  storage:
    build:
      context: storage
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      - receiver
      - db
      - kafka
    volumes:
      - ./config:/config
      - ./logs:/logs

  processing:
    build:
      context: processing
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      - storage
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./data/processing:/data

  analyzer:
    build:
      context: analyzer
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      - storage
      - kafka
      - receiver
    volumes:
      - ./config:/config
      - ./logs:/logs


  dashboard:
    image: dashboard
    build:
      context: ./dashboard-ui
    depends_on:
      - processing
      - analyzer
volumes:
  mysql_data:
  kafka-data:
  zookeeper-data: