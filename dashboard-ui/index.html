<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="ACIT3855 statistics application" />
    <script src="updateStats.js"></script>
    <title>ACIT3855 - Race Stats</title>
</head>

<body>
    <main id="main">
        <div id="header">
            <h1>Dashboard</h1>
            <img src="logo.png" alt="Race Logo" width="150"/>
        </div>
        <h5 id="last-updated">Last update: <span id="last-updated-value">N/A</span></h5>
        <div id="messages"></div>
        <h2>Statistics</h2>
        <div id="statistics">
            <div id="processing">
                <h3>Processing Service Stats</h3>
                <code id="processing-stats">Placeholder value - processing stats should appear here</code>
            </div>
            <div id="analyzer">
                <h3>Analyzer Service Stats</h3>
                <code id="analyzer-stats">Placeholder value - analyzer stats should appear here</code>
            </div>
        </div>
        <h2>Recent Analyzer events</h2>
        <div id="analyzer">
            <div>
                <h3>Sector event</h3>
                <code id="event-sectors">
                </code>
            </div>
            <div>
                <h3>Lap event</h3>
                <code id="event-laps">
                </code>
            </div>
        </div>
    </main>
</body>

</html>
